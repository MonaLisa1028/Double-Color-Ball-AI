name: Update Lottery Data and AI Predictions

on:
  schedule:
    # 每天北京时间 22:00 (UTC 14:00) 运行
    - cron: '0 14 * * *'
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 核心修复：同时安装 requests, beautifulsoup4, zhipuai 和 openai
          pip install requests beautifulsoup4 zhipuai openai

      - name: Run Lottery Fetcher and AI Prediction
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: |
          # 1. 进入抓取目录并更新数据
          cd fetch_history
          python3 fetch_lottery_history.py
          
          # 2. 返回根目录
          cd ..
          
          # 3. 运行 AI 预测脚本
          python3 generate_ai_prediction.py

      - name: Check for changes
        id: check_changes
        run: |
          # 检查数据文件是否有变动
          git add data/*.json fetch_history/*.json
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: auto-update lottery results and AI predictions $(date +'%Y-%m-%d %H:%M:%S')"
          git push

      - name: Execution Summary
        if: success()
        run: |
          echo "### 🚀 自动更新任务成功" >> $GITHUB_STEP_SUMMARY
          echo "* 最新开奖数据已同步 (26035期)" >> $GITHUB_STEP_SUMMARY
          echo "* AI 预测已成功生成" >> $GITHUB_STEP_SUMMARY
